name: Edgbaston Ticket Watch

on:
  schedule:
    - cron: "*/5 6-21 * * *"  # 07:00–22:00 UK time (approx BST)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      # -----------------------------
      # RESTORE CACHE (state + logs)
      # -----------------------------
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            state/
            logs/
          key: edgbaston-watch-cache-${{ github.run_id }}
          restore-keys: |
            edgbaston-watch-cache-

      # -----------------------------
      # RUN MONITOR
      # -----------------------------
      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/monitor.py

      - name: View CSV log
      run: |
        echo "===== LOG FILE ====="
        cat logs/current.csv || echo "No logs yet"

      # -----------------------------
      # SAVE CACHE
      # -----------------------------
      - name: Save state cache
        uses: actions/cache@v4
        with:
          path: |
            state/
            logs/
          key: edgbaston-watch-cache-${{ github.run_id }}
